name: MCP stack validate (full)
on:
  pull_request:

permissions:
  pull-requests: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm test          # produces tests/__agentsnap__/*.current.json
      - uses: MukundaKatta/mcp-stack-validate-action@v1
        with:
          tools-glob: "src/tools/*.json,mcp.json"
          prompts-glob: "prompts/*.md"
          prompts-token-budget: "8000"
          prompts-model: "claude"
          agentguard-policy-path: ".agentguard.json"
          snapshots-dir: "tests/__agentsnap__"
          shapes-glob: "examples/*.json"
          fail-on: "any"
          comment-on-pr: true
